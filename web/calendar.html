<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f13;
    --bg2:       #18181f;
    --bg3:       #22222c;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.14);
    --text:      #e8e8f0;
    --text2:     #9090a8;
    --text3:     #55556a;
    --accent:    #7c6af7;
    --accent2:   #a594f9;
    --green:     #3ecf8e;
    --green-dim: rgba(62,207,142,0.15);
    --amber:     #f5a623;
    --amber-dim: rgba(245,166,35,0.13);
    --red:       #f87171;
    --radius:    12px;
    --radius-sm: 8px;
    --cell-size: 110px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .app-title { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
  .app-sub { font-size: 12px; color: var(--text2); margin-top: 1px; font-family: 'DM Mono', monospace; }

  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .sync-btn {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 16px; cursor: pointer;
    transition: opacity .15s;
  }
  .sync-btn:hover { opacity: .85; }
  .sync-btn.loading { opacity: .6; pointer-events: none; }
  .sync-icon { font-size: 14px; }

  /* ── Legend ── */
  .legend-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .legend-label { font-size: 11px; color: var(--text3); margin-right: 4px; text-transform: uppercase; letter-spacing: .8px; }
  .legend-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px 4px 6px;
    font-size: 12px; color: var(--text);
  }
  .av-sm {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; flex-shrink: 0;
  }

  /* ── Main ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Calendar panel ── */
  .cal-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

  .cal-nav {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 20px;
  }
  .cal-month {
    font-size: 22px; font-weight: 600; letter-spacing: -.5px;
    flex: 1;
  }
  .cal-month span { color: var(--text2); font-weight: 300; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 16px;
    width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .nav-btn:hover { background: var(--bg2); }
  .today-btn {
    background: none; border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2); font-family: 'DM Sans', sans-serif;
    font-size: 12px; padding: 0 14px; height: 36px;
    cursor: pointer; transition: color .12s, border-color .12s;
  }
  .today-btn:hover { color: var(--text); border-color: var(--border2); }

  /* grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-hdr {
    text-align: center;
    font-size: 11px; font-weight: 500;
    color: var(--text3);
    text-transform: uppercase; letter-spacing: .8px;
    padding: 0 0 8px;
  }
  .cell {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg2);
    padding: 8px 9px 7px;
    min-height: 88px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .cell:hover { border-color: var(--border2); background: var(--bg3); }
  .cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .cell.today { border-color: var(--accent); }
  .cell.today .cell-num { color: var(--accent2); }
  .cell.selected { border-color: var(--accent2); background: var(--bg3); box-shadow: 0 0 0 1px var(--accent2); }

  .cell-num {
    font-size: 12px; font-weight: 500;
    color: var(--text2);
    margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
  }
  .cell-avatars { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; }
  .av {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; flex-shrink: 0;
    border: 1.5px solid transparent;
  }
  .av.me { border-color: rgba(255,255,255,.3); }
  .cell-bar {
    margin-top: 6px; height: 2px;
    border-radius: 2px;
    background: var(--border);
    overflow: hidden;
  }
  .cell-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }

  /* ── Detail panel ── */
  .detail-panel {
    width: 280px;
    border-left: 1px solid var(--border);
    background: var(--bg2);
    display: flex; flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .detail-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text3); gap: 10px; text-align: center;
    padding: 24px;
  }
  .detail-empty-icon { font-size: 36px; opacity: .4; }
  .detail-empty-txt { font-size: 13px; line-height: 1.5; }

  .detail-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .detail-date { font-size: 13px; font-weight: 600; color: var(--text); }
  .detail-weekday { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .detail-stats-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .stat-chip {
    flex: 1;
    background: var(--bg3);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-key { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .6px; }

  .detail-list { padding: 12px 0; }
  .friend-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .friend-row:last-child { border-bottom: none; }
  .friend-row:hover { background: var(--bg3); }
  .friend-info { flex: 1; min-width: 0; }
  .friend-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .friend-count { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .friend-badge {
    font-size: 10px; font-weight: 600;
    border-radius: 20px; padding: 3px 9px;
    text-transform: uppercase; letter-spacing: .5px;
    flex-shrink: 0;
  }
  .badge-done { background: var(--green-dim); color: var(--green); }
  .badge-miss { background: rgba(255,255,255,.05); color: var(--text3); }

  /* status bar */
  .status-bar {
    padding: 10px 28px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3);
    font-family: 'DM Mono', monospace;
    background: var(--bg2);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .status-dot.warn { background: var(--amber); }
  .status-dot.err  { background: var(--red); }

  /* scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">📅</div>
    <div>
      <div class="app-title">Study Tracker</div>
      <div class="app-sub" id="group-name">loading...</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="sync-btn" id="sync-btn" onclick="doSync()">
      <span class="sync-icon">↻</span> Sync GitHub
    </button>
  </div>
</div>

<!-- Legend -->
<div class="legend-bar" id="legend-bar">
  <span class="legend-label">Thành viên</span>
</div>

<!-- Main -->
<div class="main">
  <!-- Calendar -->
  <div class="cal-panel">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
      <div class="cal-month" id="cal-month-title">–</div>
      <button class="today-btn" onclick="goToday()">Hôm nay</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty">
      <div class="detail-empty-icon">🗓</div>
      <div class="detail-empty-txt">Bấm vào một ngày để xem tiến độ của cả nhóm</div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Đang tải dữ liệu...</span>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let FRIENDS = [];
let curYear, curMonth;   // 0-indexed month
let selectedDate = null; // 'YYYY-MM-DD'

const TODAY = (() => {
  const d = new Date();
  return fmtDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
})();

// ── Entry point (called by Python) ─────────────────────────────────────────
window.initCalendar = function(friendsData) {
  FRIENDS = friendsData || [];
  const now = new Date();
  curYear  = now.getFullYear();
  curMonth = now.getMonth();    // 0-indexed
  renderLegend();
  renderCalendar();
  setStatus('ok', `${FRIENDS.length} thành viên · cập nhật ${new Date().toLocaleTimeString('vi-VN')}`);

  // group name
  const names = FRIENDS.map(f => f.name).join(', ');
  document.getElementById('group-name').textContent = names;
};

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmtDate(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128 ? '#111' : '#fff';
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).join('').slice(0,2);
}

function friendsOnDate(dateStr) {
  return FRIENDS.filter(f => f.reviews && f.reviews[dateStr] !== undefined);
}

function totalCards(dateStr) {
  return FRIENDS.reduce((s, f) => s + (f.reviews?.[dateStr] ?? 0), 0);
}

// ── Legend ──────────────────────────────────────────────────────────────────
function renderLegend() {
  const bar = document.getElementById('legend-bar');
  bar.innerHTML = '<span class="legend-label">Thành viên</span>';
  FRIENDS.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'legend-chip';
    chip.innerHTML = `
      <div class="av-sm" style="background:${f.color};color:${contrastColor(f.color)}">${initials(f.name)}</div>
      ${f.name}
    `;
    bar.appendChild(chip);
  });
}

// ── Calendar render ──────────────────────────────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Month title
  const monthNames = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6',
                       'Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  document.getElementById('cal-month-title').innerHTML =
    `${monthNames[curMonth]} <span>${curYear}</span>`;

  // Day headers (Mon first)
  ['T2','T3','T4','T5','T6','T7','CN'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'day-hdr';
    h.textContent = d;
    grid.appendChild(h);
  });

  // First day of month (0=Sun, adjust to Mon-first)
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const offset = (firstDay + 6) % 7;  // Mon=0 … Sun=6
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

  for (let i = 0; i < offset; i++) {
    const blank = document.createElement('div');
    blank.className = 'cell empty';
    grid.appendChild(blank);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = fmtDate(curYear, curMonth + 1, day);
    const cell = document.createElement('div');

    const classes = ['cell'];
    if (dateStr === TODAY) classes.push('today');
    if (dateStr === selectedDate) classes.push('selected');
    cell.className = classes.join(' ');
    cell.dataset.date = dateStr;
    cell.onclick = () => selectDate(dateStr);

    // Date number
    const numDiv = document.createElement('div');
    numDiv.className = 'cell-num';
    numDiv.textContent = day;
    cell.appendChild(numDiv);

    // Avatars
    const avRow = document.createElement('div');
    avRow.className = 'cell-avatars';
    const done = friendsOnDate(dateStr);
    done.forEach(f => {
      const av = document.createElement('div');
      av.className = 'av';
      av.style.background = f.color;
      av.style.color = contrastColor(f.color);
      av.textContent = initials(f.name);
      avRow.appendChild(av);
    });
    cell.appendChild(avRow);

    // Progress bar
    if (FRIENDS.length > 0) {
      const pct = Math.round((done.length / FRIENDS.length) * 100);
      const barWrap = document.createElement('div');
      barWrap.className = 'cell-bar';
      const fill = document.createElement('div');
      fill.className = 'cell-bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--amber)';
      barWrap.appendChild(fill);
      cell.appendChild(barWrap);
    }

    grid.appendChild(cell);
  }
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function selectDate(dateStr) {
  selectedDate = dateStr;
  // re-render to update selected highlight
  renderCalendar();

  const panel = document.getElementById('detail-panel');
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const weekdays = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
  const months = ['tháng 1','tháng 2','tháng 3','tháng 4','tháng 5','tháng 6',
                  'tháng 7','tháng 8','tháng 9','tháng 10','tháng 11','tháng 12'];

  const done = friendsOnDate(dateStr);
  const notDone = FRIENDS.filter(f => !f.reviews?.[dateStr]);
  const total = totalCards(dateStr);
  const pct = FRIENDS.length ? Math.round(done.length / FRIENDS.length * 100) : 0;

  let html = `
    <div class="detail-header">
      <div class="detail-date">${d} ${months[m-1]}, ${y}</div>
      <div class="detail-weekday">${weekdays[dt.getDay()]}</div>
      <div class="detail-stats-row">
        <div class="stat-chip">
          <div class="stat-val">${done.length}/${FRIENDS.length}</div>
          <div class="stat-key">đã học</div>
        </div>
        <div class="stat-chip">
          <div class="stat-val">${total}</div>
          <div class="stat-key">tổng thẻ</div>
        </div>
        <div class="stat-chip">
          <div class="stat-val">${pct}%</div>
          <div class="stat-key">nhóm xong</div>
        </div>
      </div>
    </div>
    <div class="detail-list">
  `;

  // Completed first
  done.forEach(f => {
    const cards = f.reviews[dateStr];
    html += `
      <div class="friend-row">
        <div class="av" style="background:${f.color};color:${contrastColor(f.color)};width:28px;height:28px;font-size:10px;flex-shrink:0">${initials(f.name)}</div>
        <div class="friend-info">
          <div class="friend-name">${f.name}</div>
          <div class="friend-count">${cards} thẻ</div>
        </div>
        <span class="friend-badge badge-done">Xong</span>
      </div>
    `;
  });

  notDone.forEach(f => {
    html += `
      <div class="friend-row">
        <div class="av" style="background:#2a2a35;color:var(--text3);width:28px;height:28px;font-size:10px;flex-shrink:0">${initials(f.name)}</div>
        <div class="friend-info">
          <div class="friend-name" style="color:var(--text2)">${f.name}</div>
          <div class="friend-count">—</div>
        </div>
        <span class="friend-badge badge-miss">Chưa học</span>
      </div>
    `;
  });

  html += '</div>';
  panel.innerHTML = html;
}

// ── Navigation ───────────────────────────────────────────────────────────────
function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth <  0) { curMonth = 11; curYear--; }
  renderCalendar();
}

function goToday() {
  const now = new Date();
  curYear  = now.getFullYear();
  curMonth = now.getMonth();
  renderCalendar();
  selectDate(TODAY);
}

// ── Sync ─────────────────────────────────────────────────────────────────────
function doSync() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="sync-icon">↻</span> Đang sync...';
  setStatus('warn', 'Đang sync với GitHub...');

  // Call Python bridge — pycmd is Anki's JS→Python bridge
  if (typeof pycmd !== 'undefined') {
    pycmd('study_tracker_sync');
  } else {
    // Running outside Anki (browser test)
    setTimeout(() => {
      btn.classList.remove('loading');
      btn.innerHTML = '<span class="sync-icon">↻</span> Sync GitHub';
      setStatus('ok', 'Sync hoàn tất (test mode)');
    }, 1500);
  }
}

// Called by Python after sync completes
window.onSyncDone = function(ok, msg) {
  const btn = document.getElementById('sync-btn');
  btn.classList.remove('loading');
  btn.innerHTML = '<span class="sync-icon">↻</span> Sync GitHub';
  if (ok) {
    setStatus('ok', msg || 'Sync thành công');
  } else {
    setStatus('err', msg || 'Sync thất bại');
  }
};

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(level, txt) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className = 'status-dot' + (level === 'ok' ? '' : level === 'warn' ? ' warn' : ' err');
  span.textContent = txt;
}

// ── Init fallback (open in browser directly for testing) ─────────────────────
if (typeof window.initCalendar === 'function' && !window._calendarInitialized) {
  window._calendarInitialized = true;
  // Demo data for browser testing
  const DEMO = [
    {
      name: "Bạn",
      color: "#7c6af7",
      reviews: buildDemoReviews(38, 0.85),
      last_updated: new Date().toISOString()
    },
    {
      name: "An",
      color: "#3ecf8e",
      reviews: buildDemoReviews(55, 0.75),
      last_updated: new Date().toISOString()
    },
    {
      name: "Bình",
      color: "#f5a623",
      reviews: buildDemoReviews(22, 0.6),
      last_updated: new Date().toISOString()
    },
    {
      name: "Chi",
      color: "#f06595",
      reviews: buildDemoReviews(44, 0.7),
      last_updated: new Date().toISOString()
    }
  ];
  window.initCalendar(DEMO);
}

function buildDemoReviews(avgCards, consistency) {
  const result = {};
  const now = new Date();
  for (let i = 0; i < 60; i++) {
    if (Math.random() < consistency) {
      const d = new Date(now - i * 86400000);
      const key = fmtDate(d.getFullYear(), d.getMonth()+1, d.getDate());
      result[key] = Math.round(avgCards * (0.6 + Math.random() * 0.8));
    }
  }
  return result;
}
</script>
</body>
</html>
